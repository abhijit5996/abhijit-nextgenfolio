<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1b1740"/>
      <stop offset="100%" stop-color="#06030f"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5ee8ff"/>
      <stop offset="55%" stop-color="#a07bff"/>
      <stop offset="100%" stop-color="#ff5fb7"/>
    </linearGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9af2ff"/>
      <stop offset="100%" stop-color="#e0b8ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="24" fill="none" stroke="url(#ring)" stroke-width="1.4" opacity=".85" filter="url(#glow)"/>
  <circle cx="32" cy="32" r="17" fill="none" stroke="#5ee8ff" stroke-width=".7" opacity=".4"/>
  <circle cx="56" cy="32" r="1.6" fill="#ff5fb7"/>
  <circle cx="8"  cy="32" r="1.2" fill="#5ee8ff"/>
  <text x="32" y="40" text-anchor="middle"
        font-family="'Space Grotesk','Inter',system-ui,sans-serif"
        font-weight="700" font-size="22" fill="url(#txt)"
        filter="url(#glow)">AD</text>
</svg>
